name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  # Linting and formatting checks
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Format check (cargo fmt)
        run: nix develop --command cargo fmt --all -- --check

      - name: Lint check (cargo clippy)
        run: nix develop --command cargo clippy --all-targets --all-features -- -D warnings

  # Nix flake validation
  nix-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Flake check
        run: nix flake check --print-build-logs

  # Build and test
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Cargo check
        run: nix develop --command cargo check --all-features --all-targets

      - name: Cargo build
        run: nix develop --command cargo build --all-features --all-targets

      - name: Workspace tests
        run: nix develop --command cargo test --workspace --all-features

      - name: Doc tests
        run: nix develop --command cargo test --doc --all-features
